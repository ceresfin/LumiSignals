<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="/static/js/lightweight-charts.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: -apple-system, sans-serif; }
    #chart { width: 100vw; height: 100vh; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #888; font-size: 14px;
    }
    #error {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #c0392b; font-size: 14px; text-align: center; padding: 20px; display: none;
    }
  </style>
</head>
<body>
  <div id="chart"></div>
  <div id="loading">Loading chart...</div>
  <div id="error"></div>

  <script>
    // Read params from URL
    const params = new URLSearchParams(window.location.search);
    const TICKER = params.get('ticker') || 'EUR_USD';
    const TIMESPAN = params.get('timespan') || '15m';
    const COUNT = params.get('count') || '300';
    const LEVELS_TICKER = TICKER.replace('_', '');

    // Trade lines (optional — passed from positions/trades screens)
    const ENTRY_PRICE = params.get('entry') ? parseFloat(params.get('entry')) : null;
    const EXIT_PRICE = params.get('exit') ? parseFloat(params.get('exit')) : null;
    const STOP_PRICE = params.get('stop') ? parseFloat(params.get('stop')) : null;
    const DIRECTION = params.get('direction') || '';
    const STRATEGY = params.get('strategy') || '';

    // Strategy display rules
    const IS_2N20 = STRATEGY.includes('2n20') || STRATEGY.includes('vwap');
    const IS_ORB = STRATEGY.includes('orb');
    const IS_H1_ZONE = STRATEGY.includes('h1_zone') || STRATEGY.includes('scalp_h1zone');
    const IS_HTF = STRATEGY.includes('htf') || STRATEGY.includes('levels') || (!IS_2N20 && !IS_ORB && !IS_H1_ZONE && !ENTRY_PRICE);
    const SHOW_LEVELS = !IS_2N20 && !IS_ORB;
    const SHOW_VWAP = IS_2N20;  // VWAP only for 2n20 strategy
    const HAS_TRADE = ENTRY_PRICE !== null;  // Only show entry/exit/stop if it's an actual trade

    // Filter levels by chart timeframe — don't show lower TF levels on higher TF charts
    const TF_RANK = { '1m': 1, '2m': 2, '5m': 3, '15m': 4, '30m': 5, '1h': 6, '4h': 7, '1d': 8, '1w': 9, '1mo': 10 };
    const LEVEL_TF_MAP = { '1H': '1h', '4H': '4h', 'D': '1d', 'W': '1w', 'M': '1mo', 'Q': '1mo' };
    const chartRank = TF_RANK[TIMESPAN] || 4;
    function shouldShowLevel(levelTf) {
      const mapped = LEVEL_TF_MAP[levelTf];
      if (!mapped) return true;
      const levelRank = TF_RANK[mapped] || 4;
      return levelRank >= chartRank;  // Only show levels at or above chart timeframe
    }

    const LEVEL_COLORS = {
      "M": { color: "#ff9800", label: "M" },
      "W": { color: "#ffeb3b", label: "W" },
      "D": { color: "#2196f3", label: "D" },
      "4H": { color: "#ce93d8", label: "4H" },
      "1H": { color: "#66bb6a", label: "1H" },
      "Q": { color: "#ff5722", label: "Q" },
    };

    async function loadChart() {
      try {
        // Fetch candles
        const candleResp = await fetch('/api/candles/' + TICKER + '?timespan=' + TIMESPAN + '&count=' + COUNT);
        const candleData = await candleResp.json();

        if (!candleData.candles || candleData.candles.length === 0) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'No candle data for ' + TICKER + ' (' + TIMESPAN + ')';
          return;
        }

        // Create chart
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
          layout: {
            background: { color: '#1a1a2e' },
            textColor: '#888',
          },
          grid: {
            vertLines: { color: '#252547' },
            horzLines: { color: '#252547' },
          },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          rightPriceScale: { borderColor: '#333' },
          timeScale: { borderColor: '#333', timeVisible: true, secondsVisible: false, fixLeftEdge: true },
          localization: {
            timeFormatter: function(timestamp) {
              const d = new Date(timestamp * 1000);
              return d.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true });
            },
          },
        });

        // Detect precision: JPY pairs use 3 decimals, others use 5
        const isJpy = TICKER.includes('JPY');
        const priceDecimals = isJpy ? 3 : (TICKER.includes('_') ? 5 : 2);

        // Candlestick series — Alpine Growth Green (demand) / Deep Pulse Red (supply)
        const candleSeries = chart.addCandlestickSeries({
          upColor: '#3E7F6B',
          downColor: '#C26A6A',
          borderUpColor: '#3E7F6B',
          borderDownColor: '#C26A6A',
          wickUpColor: '#3E7F6B',
          wickDownColor: '#C26A6A',
          priceFormat: { type: 'price', precision: priceDecimals, minMove: Math.pow(10, -priceDecimals) },
        });

        // Shift timestamps from UTC to ET (UTC-4 EDT / UTC-5 EST)
        // Lightweight Charts treats timestamps as local time, so we offset to ET
        const now = new Date();
        const jan = new Date(now.getFullYear(), 0, 1);
        const jul = new Date(now.getFullYear(), 6, 1);
        const isDST = Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset()) > now.getTimezoneOffset();
        // We want ET offset: -4h EDT, -5h EST. But since the device might be any tz,
        // we apply a fixed offset to make the chart axis show ET.
        const ET_OFFSET = isDST ? -4 * 3600 : -5 * 3600;
        candleData.candles.forEach(c => { c.time = c.time + ET_OFFSET; });

        // Sort + dedup candles
        const sorted = candleData.candles.filter(c => c.time > 0).sort((a, b) => a.time - b.time);
        const unique = [];
        const seen = new Set();
        for (const c of sorted) {
          if (!seen.has(c.time)) {
            seen.add(c.time);
            unique.push(c);
          }
        }
        candleSeries.setData(unique);

        // VWAP line — only for 2n20 strategy
        if (SHOW_VWAP) {
          let vwapNum = 0, vwapDen = 0;
          const vwapData = [];
          for (const c of unique) {
            const hlc3 = (c.high + c.low + c.close) / 3;
            vwapNum += hlc3;
            vwapDen += 1;
            vwapData.push({ time: c.time, value: vwapNum / vwapDen });
          }
          const vwapSeries = chart.addLineSeries({
            color: '#ff6d00',
            lineWidth: 2,
            title: 'VWAP',
            priceLineVisible: false,
          });
          vwapSeries.setData(vwapData);
        }

        // Fetch and overlay S/R levels (only for HTF strategies, not 2n20)
        if (SHOW_LEVELS) try {
          const levelsResp = await fetch('/api/levels/' + LEVELS_TICKER);
          const levelsData = await levelsResp.json();

          const levels = levelsData.tv && Object.keys(levelsData.tv).length > 0
            ? levelsData.tv
            : levelsData.server || {};

          for (const [tf, data] of Object.entries(levels)) {
            const cfg = LEVEL_COLORS[tf];
            if (!cfg || !data) continue;
            if (!shouldShowLevel(tf)) continue;  // Filter by chart timeframe

            if (data.supply) {
              candleSeries.createPriceLine({
                price: data.supply,
                color: cfg.color,
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: cfg.label + ' S1',
              });
            }
            if (data.demand) {
              candleSeries.createPriceLine({
                price: data.demand,
                color: cfg.color,
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: cfg.label + ' D1',
              });
            }
          }
        } catch (e) {
          console.log('Levels error:', e);
        }

        // Trade entry/exit/stop — drawn as both a midline AND a shaded band.
        // Band widths come from the chart's own ATR (14-period TR average) so
        // they automatically scale with the model's trigger TF.
        const isLong = DIRECTION === 'BUY' || DIRECTION === 'LONG';

        function computeAtr(candles, period = 14) {
          if (!candles || candles.length < 2) return 0;
          const trs = [];
          for (let i = 1; i < candles.length; i++) {
            const c = candles[i], p = candles[i - 1];
            const tr = Math.max(
              c.high - c.low,
              Math.abs(c.high - p.close),
              Math.abs(c.low - p.close)
            );
            trs.push(tr);
          }
          const slice = trs.slice(-period);
          return slice.reduce((a, b) => a + b, 0) / slice.length;
        }
        const ATR = computeAtr(unique, 14);

        // ─── ADX Dashboard overlay (mirrors the user's TradingView Pine) ───
        // Computes Direction / Trend / Momentum / ADX / Quadrant on the
        // candles already loaded for the current TF, renders as a top-right
        // panel. Updates on every TF switch since the chart reloads candles.
        (function renderAdxDashboard() {
          if (!unique || unique.length < 65) return;  // need ~50 for SMA + 14 for DMI/RSI

          // ── DMI / ADX (Wilder smoothing) ─────────────────────────────
          function wilderSmooth(arr, p) {
            if (arr.length < p) return [];
            const out = [arr.slice(0, p).reduce((a, b) => a + b, 0)];
            for (let i = p; i < arr.length; i++) {
              out.push(out[out.length - 1] - out[out.length - 1] / p + arr[i]);
            }
            return out;
          }
          function computeDmi(bars, period) {
            if (bars.length < period + 2) return null;
            const plusDM = [], minusDM = [], trs = [];
            for (let i = 1; i < bars.length; i++) {
              const h = bars[i].high, l = bars[i].low, pc = bars[i - 1].close;
              const ph = bars[i - 1].high, pl = bars[i - 1].low;
              const up = h - ph, dn = pl - l;
              plusDM.push((up > dn && up > 0) ? up : 0);
              minusDM.push((dn > up && dn > 0) ? dn : 0);
              trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            const sPlus = wilderSmooth(plusDM, period);
            const sMinus = wilderSmooth(minusDM, period);
            const sTr = wilderSmooth(trs, period);
            if (!sTr.length || sTr[sTr.length - 1] === 0) return null;
            const plusDI = 100 * sPlus[sPlus.length - 1] / sTr[sTr.length - 1];
            const minusDI = 100 * sMinus[sMinus.length - 1] / sTr[sTr.length - 1];
            // ADX = Wilder-smoothed DX
            const dx = [];
            for (let i = 0; i < sPlus.length; i++) {
              if (sTr[i] === 0) continue;
              const pdi = 100 * sPlus[i] / sTr[i];
              const mdi = 100 * sMinus[i] / sTr[i];
              if (pdi + mdi > 0) dx.push(100 * Math.abs(pdi - mdi) / (pdi + mdi));
            }
            let adx = 0;
            if (dx.length >= period) {
              const a = wilderSmooth(dx, period);
              // wilderSmooth returns a running sum; divide by period to
              // get the Wilder MOVING AVERAGE that ADX requires (0-100).
              adx = a[a.length - 1] / period;
            }
            return { plusDI, minusDI, adx };
          }

          // ── SMA / RSI on close ───────────────────────────────────────
          const closes = unique.map(b => b.close);
          function sma(arr, p) {
            if (arr.length < p) return null;
            const s = arr.slice(-p);
            return s.reduce((a, b) => a + b, 0) / p;
          }
          function rsi(arr, p) {
            if (arr.length <= p) return null;
            let gains = 0, losses = 0;
            for (let i = 1; i <= p; i++) {
              const c = arr[i] - arr[i - 1];
              if (c > 0) gains += c; else losses -= c;
            }
            let ag = gains / p, al = losses / p;
            for (let i = p + 1; i < arr.length; i++) {
              const c = arr[i] - arr[i - 1];
              const g = c > 0 ? c : 0, l2 = c < 0 ? -c : 0;
              ag = (ag * (p - 1) + g) / p;
              al = (al * (p - 1) + l2) / p;
            }
            if (al === 0) return 100;
            const rs = ag / al;
            return 100 - 100 / (1 + rs);
          }

          const dmi = computeDmi(unique, 14);
          if (!dmi) return;
          const sma50 = sma(closes, 50);
          const rsi14 = rsi(closes, 14);
          if (sma50 == null || rsi14 == null) return;

          // ── Direction: structure for FX, +DI vs -DI for everything else ─
          // FX detection mirrors the backend: underscore form (USD_JPY) or
          // 6-letter alpha (USDJPY).
          const isFx = (TICKER.includes('_') && TICKER.split('_').length === 2)
                       || (TICKER.length === 6 && /^[A-Z]+$/.test(TICKER));

          function structureDirection(bars, n) {
            if (!bars || bars.length < 2 * n + 2) return { dir: 'SIDEWAYS', note: 'not enough bars' };
            const highs = [], lows = [];
            for (let i = n; i < bars.length - n; i++) {
              const h = bars[i].high, l = bars[i].low;
              let isH = true, isL = true;
              for (let j = 1; j <= n; j++) {
                if (!(bars[i-j].high < h && bars[i+j].high < h)) isH = false;
                if (!(bars[i-j].low  > l && bars[i+j].low  > l)) isL = false;
                if (!isH && !isL) break;
              }
              if (isH) highs.push(h);
              if (isL) lows.push(l);
            }
            if (highs.length < 2 || lows.length < 2) {
              return { dir: 'SIDEWAYS', note: highs.length + 'H/' + lows.length + 'L pivots' };
            }
            const hh = highs[highs.length-1] > highs[highs.length-2];
            const hl = lows[lows.length-1] > lows[lows.length-2];
            const lh = highs[highs.length-1] < highs[highs.length-2];
            const ll = lows[lows.length-1] < lows[lows.length-2];
            if (hh && hl) return { dir: 'UP',   note: 'HH+HL' };
            if (lh && ll) return { dir: 'DOWN', note: 'LH+LL' };
            return { dir: 'SIDEWAYS', note: (hh ? 'HH' : 'LH') + '+' + (hl ? 'HL' : 'LL') };
          }

          let direction, trendValue;
          let directionUp = false, directionDown = false;
          if (isFx) {
            const struct = structureDirection(unique, 15);
            direction = struct.dir;
            directionUp = direction === 'UP';
            directionDown = direction === 'DOWN';
            // Repurpose the Trend cell to show structure context (HH+HL etc.)
            trendValue = struct.note;
          } else {
            directionUp = dmi.plusDI > dmi.minusDI + 2;
            directionDown = dmi.plusDI < dmi.minusDI - 2;
            direction = directionUp ? 'UP' : directionDown ? 'DOWN' : 'SIDEWAYS';
            trendValue = (dmi.plusDI - (dmi.minusDI + 2)).toFixed(2);
          }

          function momentumLabel(adx) {
            if (adx >= 50) return 'Unusually Very Strong';
            if (adx >= 30) return 'Very Strong';
            if (adx >= 25) return 'Strong';
            if (adx >= 20) return 'Moderate';
            if (adx >= 15) return 'Weak';
            if (adx >= 10) return 'Very Weak';
            return 'No to Very Weak';
          }
          function momentumColor(adx) {
            if (adx >= 50) return 'rgb(204,85,0)';     // burnt orange
            if (adx >= 30) return 'rgb(255,193,37)';   // gold
            if (adx >= 25) return 'rgb(238,201,0)';    // light gold
            if (adx >= 20) return 'rgb(210,180,140)';  // tan
            if (adx >= 15) return 'rgb(188,170,150)';  // taupe
            if (adx >= 10) return 'rgb(210,200,190)';  // light taupe
            return '#fff';
          }
          const dirColor = directionUp ? '#3E7F6B' : directionDown ? '#C26A6A' : '#ffeb3b';
          // trendValue is a number for non-FX (positive=green) and a string
          // for FX (HH+HL / LH+LL — colored to match the direction).
          const trendColor = (typeof trendValue === 'number')
            ? (trendValue >= 0 ? '#3E7F6B' : '#C26A6A')
            : dirColor;
          const trendDisplay = (typeof trendValue === 'number')
            ? trendValue.toFixed(2)
            : trendValue;
          const momColor = momentumColor(dmi.adx);

          const aboveSMA = unique[unique.length - 1].close > sma50;
          const overbought50 = rsi14 >= 50;
          let qLabel, qColor;
          if (aboveSMA && overbought50)      { qLabel = 'Q1 Purple'; qColor = '#9c27b0'; }
          else if (aboveSMA && !overbought50) { qLabel = 'Q2 Green';  qColor = '#3E7F6B'; }
          else if (!aboveSMA && overbought50) { qLabel = 'Q3 Red';    qColor = '#C26A6A'; }
          else                                { qLabel = 'Q4 Yellow'; qColor = '#ffeb3b'; }
          const qSubtitle = (aboveSMA ? 'Above SMA' : 'Below SMA') + ' · RSI ' + rsi14.toFixed(2);

          // ── Render ───────────────────────────────────────────────────
          const panel = document.createElement('div');
          panel.id = 'adx-dashboard';
          // Remove old panel if present (TF switches re-run this)
          const old = document.getElementById('adx-dashboard');
          if (old) old.remove();
          panel.style.cssText =
            'position:absolute;top:8px;right:8px;background:rgba(30,30,30,0.92);' +
            'padding:8px 10px;border-radius:8px;border:1px solid #555;' +
            'font-family:ui-monospace,Menlo,monospace;font-size:11px;' +
            'color:#ddd;z-index:1000;min-width:170px;';
          function row(label, value, valueColor) {
            return '<div style="display:flex;justify-content:space-between;gap:14px;padding:1px 0">' +
              '<span style="color:#888">' + label + '</span>' +
              '<span style="color:' + valueColor + ';font-weight:600">' + value + '</span>' +
              '</div>';
          }
          panel.innerHTML =
            '<div style="color:#888;font-size:9px;letter-spacing:0.6px;margin-bottom:4px">ADX DASHBOARD · ' + TIMESPAN + '</div>' +
            row('Direction', direction, dirColor) +
            row('Trend', trendDisplay, trendColor) +
            row('Momentum', momentumLabel(dmi.adx), momColor) +
            row('ADX', dmi.adx.toFixed(2), momColor) +
            row('Quadrant', qLabel, qColor) +
            '<div style="color:#666;font-size:9px;margin-top:3px;text-align:right">' + qSubtitle + '</div>';
          document.body.appendChild(panel);
        })();

        // Helper: draw a horizontal shaded band [low, high] over the chart's
        // full time range using a Baseline series.
        function drawBand(low, high, fillColor, label, labelColor) {
          if (!unique.length || low >= high) return;
          const tStart = unique[0].time;
          const tEnd = unique[unique.length - 1].time;
          const band = chart.addBaselineSeries({
            baseValue: { type: 'price', price: low },
            topLineColor: 'transparent',
            topFillColor1: fillColor,
            topFillColor2: fillColor,
            bottomLineColor: 'transparent',
            bottomFillColor1: 'rgba(0,0,0,0)',
            bottomFillColor2: 'rgba(0,0,0,0)',
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: false,
          });
          band.setData([
            { time: tStart, value: high },
            { time: tEnd, value: high },
          ]);
          // Edge marker (price-axis label) at the band top
          if (label) {
            band.createPriceLine({
              price: high,
              color: labelColor,
              lineWidth: 1,
              lineStyle: LightweightCharts.LineStyle.Dotted,
              axisLabelVisible: true,
              title: label,
            });
          }
        }

        // Entry: solid line + one-sided shaded band extending TOWARD the
        // target so it visually leans the way the trade is meant to go.
        if (HAS_TRADE && ENTRY_PRICE && ATR > 0) {
          const w = 0.5 * ATR;
          const low  = isLong ? ENTRY_PRICE : ENTRY_PRICE - w;
          const high = isLong ? ENTRY_PRICE + w : ENTRY_PRICE;
          const fill = isLong ? 'rgba(62,127,107,0.40)' : 'rgba(194,106,106,0.40)';
          drawBand(low, high, fill, null);
        }
        if (HAS_TRADE && ENTRY_PRICE) {
          candleSeries.createPriceLine({
            price: ENTRY_PRICE,
            color: isLong ? '#3E7F6B' : '#C26A6A',
            lineWidth: 2,
            lineStyle: LightweightCharts.LineStyle.Solid,
            axisLabelVisible: true,
            title: 'Entry',
          });
        }

        // Target: solid line + one-sided shaded "meat" band on the ENTRY
        // side of the target — the territory the trade has to traverse to
        // be profitable. Same lean as the entry band so both visually point
        // the same way.
        if (HAS_TRADE && EXIT_PRICE && ATR > 0) {
          const w = 1.0 * ATR;
          const low  = isLong ? EXIT_PRICE - w : EXIT_PRICE;
          const high = isLong ? EXIT_PRICE : EXIT_PRICE + w;
          drawBand(low, high, 'rgba(255,152,0,0.45)', null);
        }
        if (HAS_TRADE && EXIT_PRICE) {
          candleSeries.createPriceLine({
            price: EXIT_PRICE,
            color: '#ff9800',
            lineWidth: 2,
            lineStyle: LightweightCharts.LineStyle.Solid,
            axisLabelVisible: true,
            title: 'Target',
          });
        }

        // Stop: dotted line only — no band
        if (HAS_TRADE && STOP_PRICE) {
          candleSeries.createPriceLine({
            price: STOP_PRICE,
            color: '#ff1744',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dotted,
            axisLabelVisible: true,
            title: 'SL',
          });
        }

        // H1 Zone Scalp: fetch live bundles + trend + fills, overlay T1/T2/T3/T4
        // per active bundle, an ADX badge in the corner, and fill markers on
        // the candles where legs actually filled or closed.
        if (IS_H1_ZONE) {
          try {
            const zResp = await fetch('/api/h1_zone/state?pair=' + TICKER);
            const z = await zResp.json();

            // (ADX trend badge removed — the general ADX Dashboard panel
            //  rendered earlier already shows the chart-TF direction.)

            // For each active bundle, draw entry/stop + 4 target lines.
            // Color per variant — alpha (15m trend) blue, beta (1h trend) purple.
            // Pending = thin/dashed; filled = solid/thicker; closed = skipped.
            const VARIANT_COLOR = { alpha: '#90caf9', beta: '#ce93d8' };
            (z.bundles || []).forEach((b) => {
              const vc = VARIANT_COLOR[b.variant] || '#90caf9';
              const vTag = b.variant.charAt(0).toUpperCase();   // 'A' or 'B'

              // Entry — only draw if not already drawn by URL params
              if (!HAS_TRADE && b.entry) {
                candleSeries.createPriceLine({
                  price: b.entry,
                  color: b.direction === 'BUY' ? '#3E7F6B' : '#C26A6A',
                  lineWidth: 2,
                  lineStyle: LightweightCharts.LineStyle.Solid,
                  axisLabelVisible: true,
                  title: 'Entry ' + vTag,
                });
              }
              if (!HAS_TRADE && b.stop) {
                candleSeries.createPriceLine({
                  price: b.stop,
                  color: '#ff1744',
                  lineWidth: 1,
                  lineStyle: LightweightCharts.LineStyle.Dotted,
                  axisLabelVisible: true,
                  title: 'SL ' + vTag,
                });
              }

              ['T1','T2','T3','T4'].forEach((tl) => {
                const price = b.targets && b.targets[tl];
                if (!price) return;
                const stateStr = (b.legs_state && b.legs_state[tl]) || 'pending';
                if (stateStr === 'closed') return;  // already exited
                const lineStyle = tl === 'T4'
                  ? LightweightCharts.LineStyle.LargeDashed
                  : LightweightCharts.LineStyle.Solid;
                candleSeries.createPriceLine({
                  price: price,
                  color: vc,
                  lineWidth: stateStr === 'filled' ? 2 : 1,
                  lineStyle: lineStyle,
                  axisLabelVisible: true,
                  title: tl + ' ' + vTag,
                });
              });
            });

            // Fill markers on the candle nearest each fill timestamp.
            if (z.fills && z.fills.length) {
              const markers = z.fills.map((f) => {
                let ts = 0;
                try { ts = Math.floor(new Date(f.time).getTime() / 1000) + ET_OFFSET; }
                catch (e) { ts = 0; }
                const isClose = f.reason && f.reason !== 'LIMIT_ORDER';
                return {
                  time: ts,
                  position: f.direction === 'BUY' ? 'belowBar' : 'aboveBar',
                  color: isClose
                    ? (f.pl > 0 ? '#3E7F6B' : (f.pl < 0 ? '#C26A6A' : '#888'))
                    : (b => '#ffeb3b')(),
                  shape: isClose ? 'square' : 'circle',
                  text: f.label + ' ' + f.variant.charAt(0).toUpperCase()
                        + (isClose && f.pl ? ' ' + (f.pl > 0 ? '+' : '') + f.pl.toFixed(2) : ''),
                };
              }).filter(m => m.time > 0).sort((a, b) => a.time - b.time);
              if (markers.length) candleSeries.setMarkers(markers);
            }
          } catch (e) {
            console.log('H1Zone overlay error:', e);
          }
        }

        // ORB: draw opening range (first 15-min bar after 9:30 AM ET)
        if (IS_ORB && unique.length > 0) {
          // Find the 9:30 AM ET candle (timestamps are already shifted to ET)
          // In ET-shifted data, 9:30 AM = hour 9, minute 30
          let orbHigh = null, orbLow = null;
          for (const c of unique) {
            const d = new Date(c.time * 1000);
            const h = d.getUTCHours();
            const m = d.getUTCMinutes();
            // First bar at or after 9:30 (in our ET-shifted timestamps)
            if (h === 9 && m >= 30 && m < 45) {
              orbHigh = c.high;
              orbLow = c.low;
              break;
            }
          }
          if (orbHigh && orbLow) {
            // ORB High line
            candleSeries.createPriceLine({
              price: orbHigh,
              color: '#00e5ff',
              lineWidth: 2,
              lineStyle: LightweightCharts.LineStyle.Solid,
              axisLabelVisible: true,
              title: 'ORB High',
            });
            // ORB Low line
            candleSeries.createPriceLine({
              price: orbLow,
              color: '#00e5ff',
              lineWidth: 2,
              lineStyle: LightweightCharts.LineStyle.Solid,
              axisLabelVisible: true,
              title: 'ORB Low',
            });
            // Target lines (20 pts from breakout)
            candleSeries.createPriceLine({
              price: orbHigh + 20,
              color: '#69f0ae',
              lineWidth: 1,
              lineStyle: LightweightCharts.LineStyle.Dotted,
              axisLabelVisible: true,
              title: 'Target +20',
            });
            candleSeries.createPriceLine({
              price: orbLow - 20,
              color: '#69f0ae',
              lineWidth: 1,
              lineStyle: LightweightCharts.LineStyle.Dotted,
              axisLabelVisible: true,
              title: 'Target -20',
            });
          }
        }

        // Fit all bars but leave right-side padding so the most-recent
        // candle isn't pinned against the price axis. Earlier attempt
        // to restrict visible range to last 60 bars was hiding trade
        // indicators (entry/SL/target lines) when their prices fell
        // outside the auto-scaled price range of the visible window.
        chart.applyOptions({
            timeScale: { rightOffset: 4, barSpacing: 8 },
        });
        chart.timeScale().fitContent();

        // Resize handler
        new ResizeObserver(() => {
          chart.applyOptions({
            width: document.getElementById('chart').clientWidth,
            height: document.getElementById('chart').clientHeight,
          });
        }).observe(document.getElementById('chart'));

        document.getElementById('loading').style.display = 'none';

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error: ' + err.message;
      }
    }

    if (typeof LightweightCharts === 'undefined') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Chart library failed to load';
    } else {
      loadChart();
    }
  </script>
</body>
</html>
