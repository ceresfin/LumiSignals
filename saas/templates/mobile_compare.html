<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNR Compare</title>
<style>
:root {
  --bg: #F5F3EE;
  --card: #fff;
  --dark: #2E2E2C;
  --text-light: #8a847e;
  --text-medium: #56665F;
  --green: #27ae60;
  --red: #c0392b;
  --olive: #7F8464;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  background: var(--bg);
  color: var(--dark);
  font-size: 13px;
  padding: 12px;
}
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.controls input {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 13px;
  background: #fff;
  font-family: inherit;
}
.controls button {
  padding: 8px 14px;
  background: var(--olive);
  color: #FFF5E1;
  border: 0;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.card {
  background: var(--card);
  border-radius: 10px;
  padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  margin-bottom: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.ticker-header {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 2px;
}
.feed-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px;
  vertical-align: middle; letter-spacing: 0.3px;
}
.feed-oanda   { background: #e8eef5; color: #2c5d8a; }   /* forex → OANDA */
.feed-polygon { background: #eef2e8; color: #4d6630; }   /* stocks/indices → Polygon */
.updated-at {
  font-size: 10px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-medium);
  margin: 14px 0 6px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 400px;
}
th {
  text-align: left;
  font-weight: 500;
  color: var(--text-light);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 6px 8px;
  border-bottom: 1.5px solid #eee;
  white-space: nowrap;
}
td {
  padding: 7px 8px;
  border-bottom: 1px solid #f5f5f5;
  vertical-align: middle;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.no-data { color: var(--text-light); font-style: italic; }
.source-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 50px;
  letter-spacing: 0.3px;
  margin-right: 3px;
}
.tag-tv { background: #e3f2fd; color: #1565c0; }
.tag-srv { background: #e8f5e9; color: var(--green); }
.tag-poly { background: #ede7f6; color: #5e35b1; }
.tag-lt { background: #fff3e0; color: #e65100; }
.trend-up { color: var(--green); font-weight: 600; }
.trend-down { color: var(--red); font-weight: 600; }
.trend-side { color: #f39c12; font-weight: 600; }
.diff-ok { background: #f1f8e9; }
.diff-warn { background: #fff8e1; }
.diff-bad { background: #fbe9e7; }
/* Stacked S1/S2 (or D1/D2) cell — level 2 sits below in a dimmer tone.
   Each line keeps its own diff tint so a mismatch on either level shows. */
.lvlcell { padding: 4px 8px; }
.lvlcell > div { padding: 2px 4px; border-radius: 3px; }
.lvl2 { color: var(--text-light); font-size: 11px; margin-top: 1px; }
.match { color: var(--green); font-weight: 600; }
.mismatch { color: var(--red); font-weight: 600; }
.loading {
  text-align: center;
  padding: 30px;
  color: var(--text-light);
  font-size: 12px;
}
/* Supply & Demand Zones graphical section */
.zones-card { margin-top: 14px; padding: 10px 8px; background: #fbf8ef;
              border: 1px solid #ede5cf; border-radius: 8px; }
.zones-header { display:flex; justify-content:space-between; align-items:baseline; }
.zones-title { font-weight: 600; font-size: 11px; letter-spacing: 0.5px;
               color: var(--text-light); }
.zones-now { font-size: 12px; color: var(--text-light); }
.zones-now strong { color: var(--text); font-weight: 600; }
.zones-sub { font-size: 10px; color: var(--text-light); margin: 4px 0 10px; line-height: 1.3; }
.zrow { display: grid; grid-template-columns: 40px 60px 1fr 60px; gap: 6px;
        align-items: center; margin-bottom: 6px; }
.zlabel { font-weight: 600; font-size: 12px; color: var(--text); }
.zchip { font-size: 11px; padding: 2px 6px; border-radius: 10px; text-align: center;
         font-weight: 500; }
.chip-dem { background: #c8e0c8; color: #2e5d2e; }
.chip-sup { background: #f2c4c4; color: #7a2b2b; }
.chip-bad { background: #ddd; color: #555; }
.zbar { position: relative; height: 18px; background: #efe9d7;
        border-radius: 3px; display: flex; overflow: visible; }
.zseg { flex: 1; height: 100%; border-right: 1px solid rgba(255,255,255,0.5); }
.zseg:last-child { border-right: none; }
.seg-d2 { background: rgba(115, 165, 115, 0.45); border-top-left-radius: 3px;
          border-bottom-left-radius: 3px; }
.seg-d1 { background: rgba(85, 145, 85, 0.85); }
.seg-gap { background: transparent; }
.seg-s1 { background: rgba(195, 100, 100, 0.85); }
.seg-s2 { background: rgba(210, 145, 145, 0.45); border-top-right-radius: 3px;
          border-bottom-right-radius: 3px; }
.seg-empty { background: #e2dcc8 !important; }
.zmarker { position: absolute; top: -3px; bottom: -3px; width: 3px;
           background: #d4a02a; border-radius: 2px; transform: translateX(-50%);
           box-shadow: 0 0 4px rgba(212,160,42,0.4); }
.zmarker::before { content: ''; position: absolute; top: -4px; left: -3.5px;
                   width: 10px; height: 10px; background: #d4a02a; border-radius: 50%; }
.zones-legend { font-size: 10px; color: var(--text-light); text-align: center;
                margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ddd; }
.zlg-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
           vertical-align: middle; margin-right: 3px; }
.zlg-d { background: rgba(85, 145, 85, 0.85); }
.zlg-s { background: rgba(195, 100, 100, 0.85); }
.zlg-p { background: #d4a02a; }
</style>
</head>
<body>

<div class="controls">
  <input id="tickerInput" placeholder="SPY,QQQ,XLF,EURUSD,GBPUSD,USDJPY" />
  <button onclick="loadComparison()">Reload</button>
</div>

<div id="compareContent">
  <div class="loading">Loading comparison data...</div>
</div>

<script>
var TF_ORDER = ['Q', 'M', 'W', 'D', '4H', '1H', '30M', '15M'];
var TF_LABELS = {Q: 'Quarterly', M: 'Monthly', W: 'Weekly', D: 'Daily',
                 '4H': '4-Hour', '1H': 'Hourly', '30M': '30-Min', '15M': '15-Min'};
var DEFAULT_TICKERS = 'SPY,QQQ,NVDA,SPX,NDX,XSP,RUT,EURUSD,GBPUSD,USDJPY';

// Read initial tickers from URL query param if provided
var urlParams = new URLSearchParams(window.location.search);
document.getElementById('tickerInput').value = urlParams.get('tickers') || DEFAULT_TICKERS;

function fmt(v) {
  if (v === null || v === undefined) return '<span class="no-data">--</span>';
  return parseFloat(v).toFixed(2);
}

// Stacked cell: level-1 on top, level-2 below (dimmer). Each line is
// tinted by how far it diverges from the TV reference for that level
// (ref1/ref2). The TV column passes itself as the reference so it stays
// neutral. Keeps the comparison readable in just 4 columns on mobile.
function lvlCell(v1, v2, ref1, ref2) {
  var c1 = diffClass(v1, ref1, 0.5);
  var c2 = diffClass(v2, ref2, 0.5);
  return '<td class="lvlcell">'
    + '<div class="' + c1 + '">' + fmt(v1) + '</div>'
    + '<div class="lvl2 ' + c2 + '">' + fmt(v2) + '</div>'
    + '</td>';
}

function trendClass(d) {
  if (!d) return 'no-data';
  return d === 'UP' ? 'trend-up' : d === 'DOWN' ? 'trend-down' : 'trend-side';
}

function trendLabel(d) {
  if (!d) return '<span class="no-data">--</span>';
  return '<span class="' + trendClass(d) + '">' + d + '</span>';
}

// Combined % + $ divergence flag (vs the TV reference). The worse of the
// two measures wins, so a small-percentage-but-real-dollar gap on a
// mid-priced stock (e.g. SPY hourly $1.40 / 0.18%) still flags amber —
// which a pure-percentage tolerance missed. The dollar floor is scoped to
// normal stock prices ($10–$2,000): below that (forex) a fixed $ gap is
// nonsense, above it (indices like SPX ~7600) it's trivial, so percentage
// alone governs those.
function diffClass(v, ref, pct) {
  if (v === null || v === undefined || ref === null || ref === undefined) return '';
  var aref = Math.abs(ref);
  var pctDiff = Math.abs(v - ref) / Math.max(aref, 0.0001) * 100;
  var absDiff = Math.abs(v - ref);
  // Percentage bands — universal across instruments.
  var pctClass = pctDiff <= 0.15 ? 0 : pctDiff <= 0.50 ? 1 : 2;
  // Absolute-dollar floor — only for the normal stock price band.
  var absClass = 0;
  if (aref >= 10 && aref <= 2000) {
    absClass = absDiff <= 1.00 ? 0 : absDiff <= 3.50 ? 1 : 2;
  }
  var worst = Math.max(pctClass, absClass);
  return worst === 0 ? 'diff-ok' : worst === 1 ? 'diff-warn' : 'diff-bad';
}

function fmtTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleString('en-US', {month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true});
}

function renderTicker(item) {
  var html = '<div class="card">';
  // Feed badge — forex compares OANDA vs TV-OANDA; stocks/indices
  // compare Polygon vs TV-Polygon. Each row says which.
  var feed = item.feed || '';
  var feedBadge = feed
    ? ' <span class="feed-badge feed-' + feed.toLowerCase() + '">' + feed + '</span>'
    : '';
  html += '<div class="ticker-header">' + item.ticker + feedBadge + '</div>';
  if (item.tv_updated) {
    html += '<div class="updated-at">SRV: ' + feed + ' · TV updated ' + fmtTime(item.tv_updated) + '</div>';
  } else {
    html += '<div class="updated-at" style="color:var(--red)">No TradingView data for this ticker</div>';
  }

  // Forex carries TWO comparisons: OANDA-feed pair (TV ↔ OANDA) and
  // Polygon-feed pair (POLY ↔ LT). Stocks/indices stay the 3-source
  // TV/SRV/LT layout (all Polygon-equivalent).
  var isForex = (item.feed === 'OANDA');
  var srvLevels = item.server || {};          // forex: OANDA · stocks: Polygon
  var polyLevels = item.server_polygon || {}; // forex only: Polygon-aligned
  var tvLevels = item.tradingview || {};
  var ltLevels = item.lumitrade || {};

  function levelTable(title, s1k, s2k) {
    var h = '<div class="section-label">' + title + '</div><table><tr><th>TF</th>';
    if (isForex) {
      h += '<th><span class="source-tag tag-tv">TV</span></th>'
         + '<th><span class="source-tag tag-srv">OANDA</span></th>'
         + '<th><span class="source-tag tag-poly">POLY</span></th>'
         + '<th><span class="source-tag tag-lt">LT</span></th>';
    } else {
      h += '<th><span class="source-tag tag-tv">TV</span></th>'
         + '<th><span class="source-tag tag-srv">SRV</span></th>'
         + '<th><span class="source-tag tag-lt">LT</span></th>';
    }
    h += '</tr>';
    TF_ORDER.forEach(function(tf) {
      var tv = tvLevels[tf] || {}, srv = srvLevels[tf] || {},
          lt = ltLevels[tf] || {}, poly = polyLevels[tf] || {};
      h += '<tr><td><strong>' + (TF_LABELS[tf] || tf) + '</strong></td>';
      if (isForex) {
        // OANDA pair: TV (ref, neutral) + OANDA tinted vs TV.
        // Polygon pair: POLY (ref, neutral) + LT tinted vs POLY.
        h += lvlCell(tv[s1k], tv[s2k], tv[s1k], tv[s2k]);
        h += lvlCell(srv[s1k], srv[s2k], tv[s1k], tv[s2k]);
        h += lvlCell(poly[s1k], poly[s2k], poly[s1k], poly[s2k]);
        h += lvlCell(lt[s1k], lt[s2k], poly[s1k], poly[s2k]);
      } else {
        h += lvlCell(tv[s1k], tv[s2k], tv[s1k], tv[s2k]);
        h += lvlCell(srv[s1k], srv[s2k], tv[s1k], tv[s2k]);
        h += lvlCell(lt[s1k], lt[s2k], tv[s1k], tv[s2k]);
      }
      h += '</tr>';
    });
    h += '</table>';
    return h;
  }

  html += levelTable('Supply Levels (Resistance) — S1 / S2', 'supply', 'supply2');
  html += levelTable('Demand Levels (Support) — D1 / D2', 'demand', 'demand2');

  // ─── TREND COMPARISON ───
  html += '<div class="section-label">Trend Direction (ADX)</div>';
  html += '<table><tr>';
  html += '<th>TF</th>';
  html += '<th><span class="source-tag tag-tv">TV</span></th>';
  html += '<th><span class="source-tag tag-srv">' + (isForex ? 'OANDA' : 'SRV') + '</span></th>';
  if (isForex) html += '<th><span class="source-tag tag-poly">POLY</span></th>';
  html += '<th><span class="source-tag tag-lt">LT</span></th>';
  html += '<th>Match</th>';
  html += '</tr>';

  var srvTrends = item.server_trends || {};
  var polyTrends = item.server_polygon_trends || {};
  var tvTrends = item.tv_trends || {};
  var ltTrends = item.lt_trends || {};

  TF_ORDER.forEach(function(tf) {
    var srvDir = srvTrends[tf];
    var polyDir = polyTrends[tf];
    var tvDir = tvTrends[tf] ? tvTrends[tf].dir : undefined;
    var tvAdx = tvTrends[tf] ? tvTrends[tf].adx : undefined;
    var ltDir = ltTrends[tf];

    // Forex match = both feed-pairs agree (OANDA≈TV AND LT≈POLY).
    // Stocks match = SRV≈TV.
    var matchStr = '';
    if (isForex) {
      var okO = (srvDir && tvDir) ? srvDir === tvDir : null;
      var okP = (ltDir && polyDir) ? ltDir === polyDir : null;
      if (okO !== null || okP !== null) {
        matchStr = (okO !== false && okP !== false)
          ? '<span class="match">✓</span>' : '<span class="mismatch">✗</span>';
      }
    } else if (srvDir && tvDir) {
      matchStr = srvDir === tvDir ? '<span class="match">✓</span>' : '<span class="mismatch">✗</span>';
    }

    var tvLabel = tvDir ? trendLabel(tvDir) : '<span class="no-data">--</span>';
    if (tvAdx !== undefined && tvAdx !== null) {
      tvLabel += ' <span style="font-size:10px;color:var(--text-light)">(' + parseFloat(tvAdx).toFixed(0) + ')</span>';
    }

    html += '<tr>';
    html += '<td><strong>' + (TF_LABELS[tf] || tf) + '</strong></td>';
    html += '<td>' + tvLabel + '</td>';
    html += '<td>' + trendLabel(srvDir) + '</td>';
    if (isForex) html += '<td>' + trendLabel(polyDir) + '</td>';
    html += '<td>' + trendLabel(ltDir) + '</td>';
    html += '<td>' + matchStr + '</td>';
    html += '</tr>';
  });
  html += '</table>';

  html += '</div>';
  return html;
}

// Unused on the Compare page — the graphical zones view lives in the
// mobile Dashboard swing-trade panel instead. Kept here as a
// reference implementation; safe to delete if the panel diverges.
function _unusedRenderZonesSection(item) {
  var price = item.current_price;
  if (price == null) return '';   // can't position the marker

  var srv = item.server || {};
  var h = '';
  h += '<div class="zones-card">';
  h += '<div class="zones-header">';
  h += '  <div class="zones-title">SUPPLY &amp; DEMAND ZONES</div>';
  h += '  <div class="zones-now">now <strong>' + price.toFixed(2) + '</strong></div>';
  h += '</div>';
  h += '<div class="zones-sub">Each level is a price zone, not a single line. Solid = nearest zone, faded = the next one out.</div>';

  TF_ORDER.forEach(function(tf) {
    var lv = srv[tf] || {};
    var d1 = lv.demand, d2 = lv.demand2, s1 = lv.supply, s2 = lv.supply2;

    // Marker position within the middle gap (35%–65% of bar).
    // If price between d1 and s1, interpolate. If past either edge,
    // clamp to the appropriate side.
    var markerPct = 50;
    if (d1 != null && s1 != null && s1 > d1) {
      var t = (price - d1) / (s1 - d1);
      markerPct = 35 + Math.max(0, Math.min(1, t)) * 30;
      if (price < d1) markerPct = 30;  // priced through nearest demand
      if (price > s1) markerPct = 70;  // priced through nearest supply
    }

    // Distance chips: down to D1 (negative if price below), up to S1
    var dDown = d1 != null ? (price - d1) : null;
    var dUp   = s1 != null ? (s1 - price) : null;

    h += '<div class="zrow">';
    h += '  <div class="zlabel">' + (TF_LABELS[tf] || tf) + '</div>';

    // Left chip — distance below to demand
    h += '  <div class="zchip ' + (dDown != null && dDown < 0 ? 'chip-bad' : 'chip-dem') + '">';
    if (dDown != null) {
      h += (dDown >= 0 ? '▼ ' : '✕ ') + Math.abs(dDown).toFixed(2);
    } else { h += '—'; }
    h += '  </div>';

    // The bar itself
    h += '  <div class="zbar">';
    h += '    <div class="zseg seg-d2 ' + (d2 == null ? 'seg-empty' : '') + '"></div>';
    h += '    <div class="zseg seg-d1 ' + (d1 == null ? 'seg-empty' : '') + '"></div>';
    h += '    <div class="zseg seg-gap"></div>';
    h += '    <div class="zseg seg-s1 ' + (s1 == null ? 'seg-empty' : '') + '"></div>';
    h += '    <div class="zseg seg-s2 ' + (s2 == null ? 'seg-empty' : '') + '"></div>';
    h += '    <div class="zmarker" style="left:' + markerPct.toFixed(1) + '%"></div>';
    h += '  </div>';

    // Right chip — distance up to supply
    h += '  <div class="zchip ' + (dUp != null && dUp < 0 ? 'chip-bad' : 'chip-sup') + '">';
    if (dUp != null) {
      h += (dUp >= 0 ? '▲ ' : '✕ ') + Math.abs(dUp).toFixed(2);
    } else { h += '—'; }
    h += '  </div>';

    h += '</div>';
  });

  h += '<div class="zones-legend">';
  h += '<span class="zlg-dot zlg-d"></span>demand (support)';
  h += ' &nbsp; · &nbsp; ';
  h += '<span class="zlg-dot zlg-s"></span>(resistance)';
  h += ' &nbsp; · &nbsp; ';
  h += '<span class="zlg-dot zlg-p"></span>price';
  h += '<div style="margin-top:4px">chips = room to the edge of the nearest zone each way</div>';
  h += '</div>';
  h += '</div>';
  return h;
}

function loadComparison() {
  var tickers = document.getElementById('tickerInput').value || DEFAULT_TICKERS;
  fetch('/api/mobile/compare/levels?tickers=' + encodeURIComponent(tickers))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tickers = data.tickers || [];
      if (tickers.length === 0) {
        document.getElementById('compareContent').innerHTML = '<div class="card"><div class="loading">No data available</div></div>';
        return;
      }
      var html = '';
      tickers.forEach(function(item) {
        html += renderTicker(item);
      });
      document.getElementById('compareContent').innerHTML = html;
    })
    .catch(function(e) {
      document.getElementById('compareContent').innerHTML = '<div class="card"><div class="loading" style="color:var(--red)">Error: ' + e.message + '</div></div>';
    });
}

loadComparison();
// Auto-refresh every 60s
setInterval(loadComparison, 60000);
</script>
</body>
</html>
