<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LumiSignals — Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --olive: #7F8464; --cream: #F5F3EE; --dark: #2E2E2C; --text-light: #8a847e; --text-medium: #56665F; --white: #fff; --green: #27ae60; --red: #c0392b; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); }
.header { background: linear-gradient(165deg, #C4B99A 0%, #B8A88C 40%, #A89878 100%); padding: 16px 0; }
.header-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 400; }
.header-nav { display: flex; gap: 12px; }
.header-nav a { font-size: 0.85rem; color: var(--dark); padding: 8px 16px; border-radius: 50px; text-decoration: none; }
.header-nav a:hover { background: rgba(0,0,0,0.05); }
.header-nav a.active { background: var(--olive); color: #FFF5E1; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 20px; overflow-x: auto; }
.card h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 400; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { text-align: left; font-weight: 500; color: var(--text-light); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 2px solid #eee; white-space: nowrap; cursor: pointer; }
th:hover { color: var(--dark); }
td { padding: 10px; border-bottom: 1px solid #f5f5f5; }
tr:hover { background: rgba(0,0,0,0.015); }
.dir-buy { color: var(--green); font-weight: 600; }
.dir-sell { color: var(--red); font-weight: 600; }
.score-badge { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: 600; }
.score-3 { background: #e8f5e9; color: var(--green); }
.score-2 { background: #fff8e1; color: #f39c12; }
.score-1 { background: #f0f0f0; color: var(--text-light); }
.score-0 { background: #fdecea; color: var(--red); }
.loading { text-align: center; padding: 40px; color: var(--text-light); }
.scan-btn { font-size: 0.78rem; background: var(--olive); border: none; border-radius: 50px; padding: 8px 18px; cursor: pointer; color: #FFF5E1; font-weight: 500; }
.scan-btn:hover { opacity: 0.9; }
.scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
.controls label { font-size: 0.78rem; color: var(--text-medium); }
.controls input, .controls select { font-size: 0.78rem; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px; }
.tf-tag { display: inline-block; font-size: 0.65rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.tf-M { background: #fff3e0; color: #e65100; }
.tf-W { background: #fffde7; color: #f9a825; }
.tf-D { background: #e3f2fd; color: #1565c0; }
.tf-4H { background: #f3e5f5; color: #7b1fa2; }
.tf-1H { background: #e8f5e9; color: #2e7d32; }
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>LumiSignals</h1>
    <nav class="header-nav">
      <a href="/dashboard">Dashboard</a>
      <a href="/watchlist">Watchlist</a>
      <a href="/trades">Trades</a>
      <a href="/compare">Compare</a>
      <a href="/scanner" class="active">Scanner</a>
      <a href="/strategy">Strategy</a>
      <a href="/setup">Settings</a>
      <a href="/logout">Log out</a>
    </nav>
  </div>
</div>
<div class="container">
  <div class="card">
    <h2>Supply / Demand Scanner</h2>
    <div class="controls">
      <label>Proximity:</label>
      <select id="proximity">
        <option value="0.5">0.5%</option>
        <option value="1.0" selected>1.0%</option>
        <option value="2.0">2.0%</option>
        <option value="3.0">3.0%</option>
        <option value="5.0">5.0%</option>
      </select>
      <label>Min Score:</label>
      <select id="minScore">
        <option value="0">Any</option>
        <option value="1">1+</option>
        <option value="2" selected>2+</option>
        <option value="3">3+</option>
      </select>
      <button class="scan-btn" id="scanBtn" onclick="runScan()">Scan Now</button>
      <span id="scanStatus" style="font-size:0.72rem; color:var(--text-light)"></span>
    </div>
    <div id="scanResults"><div class="loading">Click "Scan Now" to scan for setups near untouched levels</div></div>
  </div>
</div>

<script>
function runScan() {
  var btn = document.getElementById('scanBtn');
  var status = document.getElementById('scanStatus');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  status.textContent = '';
  document.getElementById('scanResults').innerHTML = '<div class="loading">Scanning stocks... this may take a minute</div>';

  var prox = document.getElementById('proximity').value;
  var minScore = parseInt(document.getElementById('minScore').value);

  fetch('/api/scanner/scan?proximity=' + prox + '&refresh=1')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = 'Scan Now';

      if (data.error) {
        document.getElementById('scanResults').innerHTML = '<div class="loading" style="color:var(--red)">' + data.error + '</div>';
        return;
      }

      var setups = (data.setups || []).filter(function(s) { return s.score >= minScore; });
      status.textContent = setups.length + ' setups found from ' + data.tickers_scanned + ' tickers (' + prox + '% proximity)';

      if (setups.length === 0) {
        document.getElementById('scanResults').innerHTML = '<div class="loading">No setups found. Try increasing proximity or lowering min score.</div>';
        return;
      }

      // Group by trade type
      var swing = setups.filter(function(s) { return s.tf === 'M' || s.tf === 'W' || s.tf === 'Q'; });
      var intraday = setups.filter(function(s) { return s.tf === 'D'; });
      var scalp = setups.filter(function(s) { return s.tf === '4H' || s.tf === '1H'; });

      function buildSection(title, subtitle, items, colorClass) {
        var html = '<div style="margin-bottom:24px">';
        html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
        html += '<span style="font-family:Playfair Display,serif;font-size:1.05rem">' + title + '</span>';
        html += '<span style="font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:50px;' + colorClass + '">' + subtitle + '</span>';
        html += '<span style="font-size:0.72rem;color:var(--text-light)">' + items.length + ' setups</span>';
        html += '</div>';
        if (items.length === 0) {
          html += '<div style="text-align:center;padding:16px;color:var(--text-light);font-size:0.82rem">No setups near ' + title.toLowerCase() + ' levels</div>';
          html += '</div>';
          return html;
        }
        html += '<table><tr>';
        html += '<th>Ticker</th><th>Price</th><th>Level</th><th>Type</th><th>TF</th>';
        html += '<th>Distance</th><th>Direction</th><th>Trend</th><th>ADX</th><th>Score</th>';
        html += '</tr>';
        items.forEach(function(s) {
          var dirClass = s.direction === 'BUY' ? 'dir-buy' : 'dir-sell';
          var trendCls = s.trend === 'UP' ? 'dir-buy' : s.trend === 'DOWN' ? 'dir-sell' : '';
          var scoreClass = s.score >= 3 ? 'score-3' : s.score >= 2 ? 'score-2' : s.score >= 1 ? 'score-1' : 'score-0';
          var tfClass = 'tf-' + s.tf;
          html += '<tr>';
          html += '<td><strong>' + s.ticker + '</strong></td>';
          html += '<td>$' + s.price.toFixed(2) + '</td>';
          html += '<td>$' + s.level.toFixed(2) + '</td>';
          html += '<td>' + s.level_type + '</td>';
          html += '<td><span class="tf-tag ' + tfClass + '">' + s.tf_name + '</span></td>';
          html += '<td>' + s.distance_pct.toFixed(2) + '%</td>';
          html += '<td><span class="' + dirClass + '">' + s.direction + '</span></td>';
          html += '<td><span class="' + trendCls + '">' + s.trend + '</span></td>';
          html += '<td>' + s.adx.toFixed(0) + '</td>';
          html += '<td><span class="score-badge ' + scoreClass + '">' + s.score + '</span></td>';
          html += '</tr>';
        });
        html += '</table></div>';
        return html;
      }

      var html = buildSection('Swing Trades', 'Weekly / Monthly / Quarterly', swing, 'background:#e8f5e9;color:#2e7d32');
      html += buildSection('Intraday Trades', 'Daily Levels', intraday, 'background:#e3f2fd;color:#1565c0');
      html += buildSection('Scalp Trades', '4-Hour / Hourly Levels', scalp, 'background:#f3e5f5;color:#7b1fa2');
      document.getElementById('scanResults').innerHTML = html;
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Scan Now';
      document.getElementById('scanResults').innerHTML = '<div class="loading" style="color:var(--red)">Error: ' + e.message + '</div>';
    });
}
</script>
</body>
</html>
