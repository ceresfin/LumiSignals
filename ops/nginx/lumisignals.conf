# /etc/nginx/sites-enabled/lumisignals
#
# bot.lumitrade.ai vhost. After IBeam migration (2026-05-08), the /ib-vnc/
# locations were removed because the noVNC backend is gone — IBeam handles
# IB Gateway login in-container, no browser-based login required.

server {
    server_name bot.lumitrade.ai;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bot.lumitrade.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.lumitrade.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bot.lumitrade.ai) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name bot.lumitrade.ai;
    return 404;
}
